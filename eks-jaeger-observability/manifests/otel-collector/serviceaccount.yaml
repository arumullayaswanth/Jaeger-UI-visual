apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: observability
  annotations:
    # Replace with a real role only if this collector needs AWS APIs.
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eks-observability-otel-collector
    eks.amazonaws.com/sts-regional-endpoints: "true"
automountServiceAccountToken: true
