apiVersion: v1
kind: Secret
metadata:
  name: jaeger-opensearch
  namespace: observability
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: observability
type: Opaque
stringData:
  # Replace with the real OpenSearch password or sync from Secrets Manager.
  password: REPLACE_WITH_SECURE_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: jaeger-opensearch-ca
  namespace: observability
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: observability
type: Opaque
stringData:
  # If your OpenSearch endpoint uses a public CA that your image already trusts,
  # you can omit this secret and disable the explicit CA mount in the Helm values.
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_YOUR_CA_BUNDLE
    -----END CERTIFICATE-----
