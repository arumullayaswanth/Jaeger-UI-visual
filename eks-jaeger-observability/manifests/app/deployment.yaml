apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-sample-app
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-sample-app
    app.kubernetes.io/component: application
    app.kubernetes.io/part-of: observability
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-sample-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-sample-app
        app.kubernetes.io/component: application
        app.kubernetes.io/part-of: observability
        environment: production
      annotations:
        kubectl.kubernetes.io/default-container: app
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      serviceAccountName: otel-sample-app
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: otel-sample-app
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-sample-app
      containers:
        - name: app
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/otel-sample-app:1.0.0    // update your images
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: otel-sample-app-config
          env:
            - name: AWS_REGION
              value: us-east-1
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
