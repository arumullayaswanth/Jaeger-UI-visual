apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-sample-app
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-sample-app
    app.kubernetes.io/part-of: observability
  annotations:
    # Replace with the least-privilege IAM role for this workload if it needs AWS APIs.
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/eks-observability-sample-app
    eks.amazonaws.com/sts-regional-endpoints: "true"
automountServiceAccountToken: true
